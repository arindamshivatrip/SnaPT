<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>SnaPT: ChatGPT Chat Optimizer</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6f7fb;
      --surface: #fcfcff;
      --surface-2: #eef1f7;
      --text: #1b1b1f;
      --text-muted: #5c5f66;
      --outline: #c4c7cf;
      --primary: #355f97;
      --on-primary: #ffffff;
      --secondary-container: #dde3f0;
      --on-secondary-container: #2a3040;
      --shadow-1: 0 1px 2px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.06);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-pill: 999px;
    }

    body[data-theme-resolved="dark"] {
      --bg: #131316;
      --surface: #1b1b1f;
      --surface-2: #211f26;
      --text: #e5e1e6;
      --text-muted: #c7c5d0;
      --outline: #47464f;
      --primary: #a8c7fa;
      --on-primary: #0b1d35;
      --secondary-container: #3a4456;
      --on-secondary-container: #dfe5f3;
      --shadow-1: 0 1px 2px rgba(0,0,0,0.28), 0 1px 3px rgba(0,0,0,0.24);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      width: 360px;
      min-height: 480px;
      padding: 16px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--outline);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-1);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .section {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .divider {
      height: 1px;
      background: var(--outline);
      opacity: 0.7;
    }

    .title {
      margin: 0;
      font-size: 1.25rem;
      line-height: 1.15;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--text-muted);
      font-size: 0.96rem;
      line-height: 1.45;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .label-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .label {
      font-size: 1rem;
      font-weight: 650;
      line-height: 1.2;
    }

    .support {
      color: var(--text-muted);
      font-size: 0.84rem;
      line-height: 1.35;
    }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field label {
      color: var(--text-muted);
      font-size: 0.82rem;
      font-weight: 650;
      line-height: 1.2;
    }

    input[type="number"] {
      appearance: none;
      width: 100%;
      border: 1px solid var(--outline);
      background: var(--surface);
      color: var(--text);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      font: inherit;
      outline: none;
      transition: border-color 140ms ease, box-shadow 140ms ease, background 140ms ease;
    }

    input[type="number"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 20%, transparent);
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 52px;
      height: 32px;
      flex: 0 0 auto;
    }

    .switch input { display: none; }

    .slider {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: var(--surface-2);
      border: 1px solid var(--outline);
      transition: background 140ms ease, border-color 140ms ease;
      cursor: pointer;
    }

    .slider::before {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--surface);
      box-shadow: var(--shadow-1);
      transition: transform 160ms ease, background 140ms ease;
    }

    input:checked + .slider {
      background: var(--primary);
      border-color: var(--primary);
    }

    input:checked + .slider::before {
      transform: translateX(20px);
      background: var(--on-primary);
    }

    button {
      appearance: none;
      border: 0;
      font: inherit;
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease, border-color 140ms ease;
    }

    button:hover { transform: translateY(-1px); }

    .filled-btn {
      width: 100%;
      border-radius: var(--radius-pill);
      padding: 13px 16px;
      background: var(--primary);
      color: var(--on-primary);
      font-weight: 700;
      box-shadow: var(--shadow-1);
    }

    .advanced-toggle {
      width: 100%;
      border-radius: var(--radius-pill);
      padding: 12px 14px;
      border: 1px solid var(--outline);
      background: var(--surface);
      color: var(--text);
      text-align: left;
      font-weight: 650;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .advanced-toggle::after {
      content: "▾";
      font-size: 0.88rem;
      color: var(--text-muted);
      transition: transform 160ms ease;
    }

    .advanced-toggle[data-open="true"]::after { transform: rotate(180deg); }

    .advanced-panel {
      display: none;
      flex-direction: column;
      gap: 14px;
      padding-top: 2px;
    }

    .advanced-panel[data-open="true"] { display: flex; }

    .theme-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .theme-label {
      color: var(--text-muted);
      font-size: 0.82rem;
      font-weight: 650;
      line-height: 1.2;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 4px;
      border-radius: var(--radius-pill);
      background: var(--surface-2);
      border: 1px solid var(--outline);
    }

    .segmented input { display: none; }

    .segmented label {
      border-radius: var(--radius-pill);
      padding: 10px 8px;
      text-align: center;
      font-size: 0.92rem;
      font-weight: 650;
      color: var(--text);
      cursor: pointer;
      user-select: none;
      transition: background 140ms ease, color 140ms ease, box-shadow 140ms ease;
    }

    .segmented input:checked + label {
      background: var(--secondary-container);
      color: var(--on-secondary-container);
      box-shadow: var(--shadow-1);
    }

    .secondary-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .outlined-btn {
      border-radius: var(--radius-pill);
      padding: 11px 12px;
      border: 1px solid var(--outline);
      background: var(--surface);
      color: var(--text);
      font-weight: 650;
    }

    .status-inline {
      display: none;
      color: var(--text-muted);
      font-size: 0.83rem;
      line-height: 1.4;
      min-height: 1.2em;
    }

    .status-inline[data-visible="true"] {
      display: block;
    }
  </style>
</head>
<body>
  <section class="panel">
    <div class="section">
      <div>
        <h1 class="title">SnaPT</h1>
        <p class="subtitle">Keep long chats snappy without changing how you work. Trim stays opt-in and your full history stays recoverable.</p>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section">
      <div class="row">
        <div class="label-wrap">
          <div id="enabledLabel" class="label">Enabled</div>
          <div id="enabledSupport" class="support">Automatic trim is on for this browser.</div>
        </div>
        <label class="switch">
          <input id="enabled" type="checkbox" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="field-grid">
        <div class="field">
          <label for="keepCount">Keep recent turns</label>
          <input id="keepCount" type="number" min="2" max="80" step="1" />
        </div>
        <div class="field">
          <label for="minTurnsBeforeTrim">Start trimming after</label>
          <input id="minTurnsBeforeTrim" type="number" min="4" max="500" step="1" />
        </div>
      </div>

      <button id="reloadBtn" class="filled-btn" title="Reloads the chat with older turns trimmed for better performance." aria-label="Trim and reload. Reloads the chat with older turns trimmed for better performance.">Trim and reload</button>
    </div>

    <div class="divider"></div>

    <div class="section">
      <button id="advancedToggle" class="advanced-toggle" data-open="false" type="button">View advanced options</button>
      <div id="advancedPanel" class="advanced-panel" data-open="false">
        <div class="theme-block">
          <div class="theme-label">Appearance</div>
          <div class="segmented">
            <input id="themeLight" type="radio" name="uiTheme" value="light" />
            <label for="themeLight">Light</label>

            <input id="themeSystem" type="radio" name="uiTheme" value="system" />
            <label for="themeSystem">System</label>

            <input id="themeDark" type="radio" name="uiTheme" value="dark" />
            <label for="themeDark">Dark</label>
          </div>
        </div>

        <div class="secondary-actions">
          <button id="trimBtn" class="outlined-btn" type="button">Trim current DOM</button>
          <button id="debugBtn" class="outlined-btn" type="button">Run debug</button>
        </div>
      </div>
    </div>

    <div id="status" class="status-inline" data-visible="false"></div>
  </section>

  <script src="popup.js"></script>
</body>
</html>
